<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css">
</head>

<body onload="iniciarJuego()">
  <div class="fondo-animado"></div>
  <div class="contenedor">

    <header class="header">
      <h1>🍋 Atrapar Limones</h1>
      <p class="frase">Si del cielo te caen limones... ¡atrápalos!</p>
      <h2 class="autor">Autor: Byron Farinango</h2>
    </header>

   <main class="juego">

  <div class="zona-juego">
    <img src="logo_alci.png" alt="logo" class="logo-lateral">

    <canvas id="areaJuego" width="600" height="400"></canvas>

    <img src="logo_alci.png" alt="logo" class="logo-lateral">
  </div>

  <div class="panel">
    <div class="stat">
      <span class="label">Puntaje</span>
      <span id="txtPuntaje">0</span>
    </div>

    <div class="stat">
      <span class="label">Vidas</span>
      <span id="txtVidas">3</span>
    </div>
  </div>

  <div id="mensaje" class="mensaje"></div>

  <div class="botones">
    <button onclick="moverIzquierda()">⬅</button>
    <button onclick="moverDerecha()">➡</button>
    <button onclick="reiniciar()">🔄 Reiniciar</button>
  </div>

</main>

  </div>

  <script src="utils.js"></script>
  <script src="limones.js"></script>
</body>
</html>
